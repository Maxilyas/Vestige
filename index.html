<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vestige</title>
    <style>
        /* Reset minimal et centrage du canvas */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        #game { display: block; }
    </style>
</head>
<body>
    <div id="game"></div>

    <!-- Phaser 3 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

    <!-- Tone.js — moteur audio procédural Web Audio (musique générée à la volée,
         aucun asset audio à charger ; cohérent avec la DA primitives Phaser) -->
    <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

    <!-- Point d'entrée du jeu (modules ES) -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
